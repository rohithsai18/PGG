version: "3.9"

services:
  demo-postgres:
    image: postgres:16-alpine
    container_name: real-estate-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - demo-postgres-data:/var/lib/postgresql/data

  demo-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: real-estate-demo-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://demo:demo@demo-postgres:5432/demo
      JWT_SECRET: demo-super-secret-jwt-key
      JWT_EXPIRES_IN: 7d
      DEMO_OTP_CODE: "123456"
      OTP_TTL_MINUTES: 10
      CORS_ORIGINS: "*"
      CHARGE_GST_PERCENT: 5
      CHARGE_REGISTRATION_PERCENT: 2
      CHARGE_OTHER_FIXED: 250000
      COST_SHEET_FORMULA_VERSION: v1
      BROCHURE_FILE_PATH: assets/brochure.pdf
      CLOUDINARY_CLOUD_NAME: demo-cloud
      CLOUDINARY_API_KEY: demo-key
      CLOUDINARY_API_SECRET: demo-secret
      CLOUDINARY_FOLDER: real-estate-demo
    depends_on:
      - demo-postgres
    ports:
      - "4000:4000"
    working_dir: /app/apps/api

volumes:
  demo-postgres-data:
