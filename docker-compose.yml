services:
  postgres:
    image: postgres:16-alpine
    container_name: real-estate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_app}
      POSTGRES_USER: ${POSTGRES_USER:-real_estate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-real_estate} -d ${POSTGRES_DB:-real_estate_app}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: real-estate-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-real_estate}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-real_estate_app}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DEMO_OTP_CODE: ${DEMO_OTP_CODE:-123456}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CHARGE_GST_PERCENT: ${CHARGE_GST_PERCENT:-5}
      CHARGE_REGISTRATION_PERCENT: ${CHARGE_REGISTRATION_PERCENT:-2}
      CHARGE_OTHER_FIXED: ${CHARGE_OTHER_FIXED:-250000}
      COST_SHEET_FORMULA_VERSION: ${COST_SHEET_FORMULA_VERSION:-v1}
      BROCHURE_FILE_PATH: ${BROCHURE_FILE_PATH:-assets/brochure.pdf}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-secret}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-real-estate-demo}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api/assets:/app/apps/api/assets:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
